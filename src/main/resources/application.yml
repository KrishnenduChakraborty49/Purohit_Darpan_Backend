spring:
  application:
    name: purohit-darpan
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:purohit_darpan}?useSSL=false&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
        format_sql: true
        use_sql_comments: true
    open-in-view: true

  sql:
    init:
      mode: never

  ai:
    ollama:
      base-url: http://127.0.0.1:11434
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:127.0.0.1}
        port: ${QDRANT_GRPC_PORT:6334}

ai:
  rag:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:purohit-darpan-secure-key-2026-fallback-only}
  expiration: ${JWT_EXPIRATION:86400000}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
  project-id: 
  mock-enabled: ${FIREBASE_MOCK_ENABLED:false}

panchang:
  api:
    use-mock: ${PANCHANG_USE_MOCK:true}

cors:
  allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.purohitdarpan: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: always
  ai:
    rag:
      enabled: true

logging:
  level:
    com.purohitdarpan: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    rag:
      enabled: false

logging:
  level:
    com.purohitdarpan: INFO