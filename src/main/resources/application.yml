spring:
  application:
    name: purohit-darpan
  profiles:
    active: prod
  datasource:
    # Reliable Render environment variable mapping
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=purohit_darpan
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant

server:
  port: ${PORT:10000}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

cors:
  allowed-origins: "*"

logging:
  level:
    com.purohitdarpan: INFO
