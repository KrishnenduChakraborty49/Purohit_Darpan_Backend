spring:
  application:
    name: purohit-darpan
  profiles:
    active: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:dpg-d738kqffte5s73et8ar0-a.ohio-postgres.render.com}:${DB_PORT:5432}/${DB_NAME:purohit_db_kd3e}
