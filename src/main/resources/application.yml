spring:
  application:
    name: purohit-darpan
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/purohit_darpan?useSSL=false&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:purohit-darpan-secure-key-2026-fallback-only}
  expiration: 86400000

cors:
  allowed-origins: "*"

logging:
  level:
    com.purohitdarpan: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
  datasource:
    url: jdbc:postgresql://dpg-d738kqffte5s73et8ar0-a.ohio-postgres.render.com:5432/purohit_db_kd3e?sslmode=require
    username: ${DB_USERNAME:purohit_db_kd3e_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
