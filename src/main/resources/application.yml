spring:
  application:
    name: purohit-darpan
  profiles:
    active: dev
  datasource:
    # Default (Local) MySQL configuration
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:purohit_darpan}?useSSL=false&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:purohit-darpan-secure-key-2026-fallback-only}
  expiration: 86400000

cors:
  allowed-origins: "*"

logging:
  level:
    com.purohitdarpan: INFO

---
# Production Profile for Render (PostgreSQL)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # Updated with ?sslmode=require for Render
    url: ${DB_URL:jdbc:postgresql://dpg-d738kqffte5s73et8ar0-a.ohio-postgres.render.com:5432/purohit_db_kd3e}?sslmode=require
    username: ${DB_USERNAME:purohit_db_kd3e_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
