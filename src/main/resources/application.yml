spring:
  main:
    lazy-initialization: true
  application:
    name: purohit-darpan
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/purohit_darpan?useSSL=false&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: true
  ai:
    openai:
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      api-key: ${GROQ_API_KEY:dummy}
      chat:
        options:
          model: ${GROQ_MODEL:llama3-8b-8192}
    rag:
      index-on-startup: false
      reindex-on-startup: false
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:dummy-key}
        collection-name: ${QDRANT_COLLECTION:purohit-darpan}
        initialize-schema: false

panchang:
  api:
    base-url: ${PANCHANG_API_BASE_URL:https://api.vedicrishi.in}
    key: ${PANCHANG_API_KEY:dummy-key}
    use-mock: ${PANCHANG_USE_MOCK:true}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:purohit-darpan}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:purohit-darpan-secure-key-2026-fallback-only}
  expiration: 86400000

logging:
  level:
    com.purohitdarpan: INFO

---
spring:
  main:
    allow-bean-definition-overriding: true
    lazy-initialization: true
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:purohit_db}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 1
      initialization-fail-timeout: 0
      connection-timeout: 30000
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    show-sql: false
  ai:
    openai:
      enabled: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0

logging:
  level:
    root: INFO
    org.springframework: INFO
