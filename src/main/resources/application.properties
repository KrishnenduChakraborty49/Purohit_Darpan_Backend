# ==========================================
# 1. CORE APPLICATION CONFIG
# ==========================================
spring.main.lazy-initialization=true
spring.application.name=purohit-darpan
# Default to prod for Render stability
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Disable conflicting configurations
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration

# ==========================================
# 2. DATABASE (Render PostgreSQL Fixes)
# ==========================================
# This one line handles 4 different fallback scenarios to ensure Render connects!
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:purohit_db}?sslmode=require}}}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate for PostgreSQL
spring.jpa.defer-datasource-initialization=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=true

# ==========================================
# 3. AI & SERVICES (Ask Guru)
# ==========================================
spring.ai.openai.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
spring.ai.openai.api-key=${GROQ_API_KEY:dummy}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama3-8b-8192}
spring.ai.openai.enabled=true

# Panchang API
panchang.api.base-url=${PANCHANG_API_BASE_URL:https://api.vedicrishi.in}
panchang.api.key=${PANCHANG_API_KEY:dummy-key}
panchang.use-mock=${PANCHANG_USE_MOCK:true}

# Firebase
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
firebase.project-id=${FIREBASE_PROJECT_ID:purohit-darpan}

# ==========================================
# 4. SECURITY & CORS (Fixes Vercel Errors)
# ==========================================
jwt.secret=${JWT_SECRET:purohit-darpan-secure-key-2026-fallback-only}
jwt.expiration=86400000

# Allow your specific Vercel frontend
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://purohit-darpan-frontend.vercel.app}

# Server Config for Render Port Binding
server.port=${PORT:8080}
server.address=0.0.0.0

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
