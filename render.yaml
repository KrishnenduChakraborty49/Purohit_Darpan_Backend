services:
  - type: web
    name: purohit-darpan-backend
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: DB_HOST
        fromDatabase:
          name: purohit-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: purohit-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: purohit-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: purohit-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: purohit-db
          property: password
      - key: FIREBASE_MOCK_ENABLED
        value: "true"
      - key: PANCHANG_USE_MOCK
        value: "true"
      - key: AI_RAG_ENABLED
        value: "false"
      - key: JWT_SECRET
        value: "purohit-darpan-secure-cloud-key-2026-deployment-fix"

databases:
  - name: purohit-db
    plan: free
    region: ohio