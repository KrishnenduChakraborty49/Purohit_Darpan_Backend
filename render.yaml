services:
  - type: web
    name: purohit-darpan-backend
    env: java
    plan: free
    region: ohio
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Xmx512m -Dserver.port=$PORT -Dserver.address=0.0.0.0 -jar target/purohit-darpan-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: purohit-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: purohit-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: purohit-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: purohit-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: purohit-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://purohit-darpan-frontend.vercel.app

databases:
  - name: purohit-db
    plan: free
    region: ohio